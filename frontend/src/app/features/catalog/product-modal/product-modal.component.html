<div
  class="fixed inset-0 z-[200] grid place-items-center bg-black/70 backdrop-blur-md p-5 animate-[fade-in_0.2s_ease]"
  (click)="onBackdrop($event)"
>
  <div
    role="dialog"
    aria-modal="true"
    class="w-full max-w-[480px] overflow-hidden rounded-2xl border border-accent/20 bg-gradient-to-br from-white/[0.06] to-white/[0.015] backdrop-blur-2xl shadow-2xl shadow-black/60 [box-shadow:0_1px_0_0_rgba(255,255,255,0.06)_inset,0_24px_60px_rgba(0,0,0,0.6),0_0_40px_-12px_rgba(37,99,235,0.25)] animate-[scale-in_0.25s_cubic-bezier(0.16,1,0.3,1)]"
  >
    <div class="flex items-center justify-between border-b border-white/10 px-6 py-5">
      <h2 class="text-[17px] font-bold text-slate-100">{{ isEdit() ? 'Editar Producto' : 'Crear Producto' }}</h2>
      <button
        class="grid h-[34px] w-[34px] place-items-center rounded-lg border border-white/10 text-slate-400 transition-all duration-150 hover:border-white/20 hover:text-slate-100 hover:rotate-90"
        (click)="close()"
        aria-label="Cerrar"
      >
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 6 6 18M6 6l12 12" />
        </svg>
      </button>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="px-6 pb-6 pt-[22px]" novalidate>
      <div class="mb-4">
        <label class="field-label">Nombre</label>
        <input class="input" type="text" formControlName="nombre" placeholder="Nombre del producto" />
      </div>

      <div class="mb-4 grid grid-cols-2 gap-3.5 max-[520px]:grid-cols-1">
        <div>
          <label class="field-label">Categoría</label>
          <select class="input" formControlName="categoria_id">
            <option [ngValue]="null" disabled>Selecciona…</option>
            @for (c of categorias(); track c.id) {
              <option [ngValue]="c.id">{{ c.nombre }}</option>
            }
          </select>
        </div>

        <div>
          <label class="field-label">Unidad de medida</label>
          <input class="input" type="text" formControlName="unidad_medida" placeholder="ej. unidad, kg" />
        </div>
      </div>

      <div class="mb-4">
        <label class="field-label">Precio (COP)</label>
        <input class="input" type="number" formControlName="precio" min="0" placeholder="0" />
      </div>

      <div class="mb-4 grid grid-cols-2 gap-3.5 max-[520px]:grid-cols-1">
        <div>
          <label class="field-label">Stock actual</label>
          <input class="input" type="number" formControlName="stock_actual" min="0" />
        </div>
        <div>
          <label class="field-label">Stock mínimo</label>
          <input class="input" type="number" formControlName="stock_minimo" min="0" />
        </div>
      </div>

      <div class="mt-6 flex justify-end gap-3">
        <button type="button" class="btn btn-ghost" (click)="close()">Cancelar</button>
        <button type="submit" class="btn btn-primary" [disabled]="form.invalid || saving()">
          @if (saving()) {
            <span class="spinner"></span>
          } @else {
            Guardar Producto
          }
        </button>
      </div>
    </form>
  </div>
</div>
